services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fugue
      POSTGRES_PASSWORD: fugue
      POSTGRES_DB: fugue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
